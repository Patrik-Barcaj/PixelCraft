<!doctype html> <!-- HTML5 doctype declaration -->
<html lang="en"> <!-- Root HTML tag with English language -->
  <head> <!-- Head section for metadata -->
    <meta charset="UTF-8" /> <!-- Set character encoding -->
    <link rel="icon" type="image/png" href="/favicon.png" /> <!-- Link to favicon -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Responsive viewport configuration -->
    <title>Pixel Craft - Visions Unleashed</title> <!-- Website title -->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Preconnect to Google Fonts static domain -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet"> <!-- Import Space Grotesk font -->
  </head> <!-- Close head section -->
  <body> <!-- Body section for content -->
    <div id="root"></div> <!-- Root container for React app -->
    <script type="module" src="/src/main.tsx"></script> <!-- Import main React entry point script -->
  </body> <!-- Close body section -->
</html> <!-- Close root HTML tag -->
